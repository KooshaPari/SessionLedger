# SessionLedger Alertmanager routing placeholder.
#
# This file is intentionally safe for local/dev environments: SLO alerts are
# grouped and sent to a webhook placeholder that operators must replace before
# using in production.
route:
  receiver: sessionledger-webhook-placeholder
  group_by:
    - alertname
    - job
    - instance
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: sessionledger-webhook-placeholder
      matchers:
        - job="sl-daemon"
      continue: false

receivers:
  - name: sessionledger-webhook-placeholder
    webhook_configs:
      - url: http://127.0.0.1:9099/sessionledger-alerts
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - alertname="SessionLedgerDaemonScrapeDown"
    target_matchers:
      - alertname="SessionLedgerFastErrorBudgetBurn"
    equal:
      - job
      - instance
