# SessionLedger — nginx TLS reverse proxy in front of the systemd-bound daemon.
# Pair with packaging/systemd/sessionledger-daemon.service (SL_HTTP_BIND=127.0.0.1:8080).
# Replace sessionledger.example.com and the certificate paths for your host.
#
# Install (example):
#   sudo install -m 0644 packaging/nginx/sessionledger.conf /etc/nginx/sites-available/sessionledger.conf
#   sudo ln -sf /etc/nginx/sites-available/sessionledger.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo systemctl enable --now sessionledger-daemon

upstream sessionledger_daemon {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name sessionledger.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sessionledger.example.com;

    # Replace with your Let's Encrypt or operator-managed cert paths.
    ssl_certificate     /etc/ssl/certs/sessionledger.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/sessionledger.key;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://sessionledger_daemon;
    }
}
