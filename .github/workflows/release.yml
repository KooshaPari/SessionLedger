# Release workflow for sl-viewer (Dioxus desktop app).
#
# Packages the native desktop viewer binary on tag push (v*) and attaches
# it to a GitHub Release.  The viewer is a single-codebase Dioxus 0.6 app
# (default feature = desktop / native window).
#
# Usage:
#   git tag v0.1.0 && git push origin v0.1.0
#
# The resulting Release will contain per-platform archives:
#   sl-viewer-<version>-x86_64-unknown-linux-gnu.tar.gz
#   sl-viewer-<version>-x86_64-apple-darwin.tar.gz
#   sl-viewer-<version>-aarch64-apple-darwin.tar.gz
#   sl-viewer-<version>-x86_64-pc-windows-msvc.zip
#   sl-viewer-<version>-windows-msi-scaffold.zip
#
# Platform signing / notarization: DEFERRED (unsigned binaries). Release
# checksums are signed with cosign keyless signing on a best-effort basis.
# Release assets receive blocking GitHub build provenance in the canonical
# KooshaPari/SessionLedger repository; forks skip that OIDC-dependent step.
# Gatekeeper and SmartScreen notes, data dirs, uninstall: docs/ops/distribution.md
#
# Ref: crates/sl-viewer/Cargo.toml  ·  crates/sl-viewer/README.md
#      packaging/README.md  ·  docs/ops/distribution.md

name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            archiver: tar czf
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            archiver: tar czf
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            archiver: tar czf
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: build sl-viewer (desktop)
        run: cargo build -p sl-viewer --release --target ${{ matrix.target }} --locked
        env:
          # The desktop feature is the default — explicit is clearer for CI.
          CARGO_FEATURES: desktop

      - name: package binary
        shell: bash
        run: |
          PKG="sl-viewer"
          VER="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          DIR="${PKG}-${VER}-${TARGET}"

          mkdir -p "${DIR}"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${TARGET}/release/${PKG}.exe" "${DIR}/"
            7z a -tzip "${DIR}.zip" "${DIR}"
            echo "ASSET=${DIR}.zip" >> "$GITHUB_ENV"
          else
            cp "target/${TARGET}/release/${PKG}" "${DIR}/"
            tar czf "${DIR}.tar.gz" "${DIR}"
            echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"
          fi

          echo "ASSET_PATH=${DIR}.${{ matrix.archive }}" >> "$GITHUB_ENV"

      - name: attest platform artifact
        if: github.repository == 'KooshaPari/SessionLedger'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: ${{ env.ASSET_PATH }}

      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: package Windows MSI scaffold
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          DIR="sl-viewer-${{ github.ref_name }}-windows-msi-scaffold"
          mkdir -p "${DIR}/packaging/windows" "${DIR}/scripts"
          cp packaging/windows/Product.wxs "${DIR}/packaging/windows/"
          cp scripts/package-msi.md "${DIR}/scripts/"
          7z a -tzip "${DIR}.zip" "${DIR}"
          echo "MSI_SCAFFOLD=${DIR}.zip" >> "$GITHUB_ENV"

      - name: upload Windows MSI scaffold
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-msi-scaffold
          path: ${{ env.MSI_SCAFFOLD }}
          if-no-files-found: error

  smoke-windows:
    name: smoke · Windows release artifact
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: x86_64-pc-windows-msvc
          path: artifact

      - name: extract and run version
        shell: pwsh
        run: |
          $archive = Get-ChildItem -LiteralPath artifact -Filter *.zip -File |
            Select-Object -First 1
          if (-not $archive) {
            throw "Windows release archive was not downloaded."
          }
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath extracted
          $binary = Get-ChildItem -LiteralPath extracted -Filter sl-viewer.exe -File -Recurse |
            Select-Object -First 1
          if (-not $binary) {
            throw "sl-viewer.exe is missing from the Windows release archive."
          }
          & $binary.FullName --version
          if ($LASTEXITCODE -ne 0) {
            throw "sl-viewer.exe --version exited with code $LASTEXITCODE."
          }

  smoke-linux:
    name: smoke · Linux release artifact
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: x86_64-unknown-linux-gnu
          path: artifact

      - name: extract and run version
        shell: bash
        run: |
          archive="$(printf '%s\n' artifact/*.tar.gz)"
          test -f "${archive}"
          mkdir extracted
          tar xzf "${archive}" -C extracted
          binary="$(printf '%s\n' extracted/*/sl-viewer)"
          test -x "${binary}"
          "${binary}" --version

  release:
    name: create Release · attach assets
    needs: [build, smoke-windows, smoke-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: list assets
        run: ls -lh artifacts/

      - name: create checksums
        working-directory: artifacts
        run: sha256sum sl-viewer-* > SHA256SUMS

      - name: install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: create CycloneDX SBOM
        run: |
          cargo cyclonedx --format json
          cp session-ledger.cdx.json artifacts/session-ledger.cdx.json

      - name: attest Release assets
        id: provenance
        if: github.repository == 'KooshaPari/SessionLedger'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: artifacts/*

      - name: report provenance status
        if: always()
        shell: bash
        run: |
          if [ "${{ github.repository }}" != "KooshaPari/SessionLedger" ]; then
            echo "::notice::Build provenance skipped outside KooshaPari/SessionLedger because OIDC attestations may be unavailable on forks."
            echo "### Build provenance: skipped outside canonical repository" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.provenance.outcome }}" = "success" ]; then
            echo "::notice::Published GitHub build provenance for Release assets."
            echo "### Build provenance: published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Build provenance failed for KooshaPari/SessionLedger Release assets; release publication is blocked."
            echo "### Build provenance: failed (blocking)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "sl-viewer ${{ github.ref_name }}"
          body: |
            ## sl-viewer ${{ github.ref_name }}

            Desktop Dioxus viewer for SessionLedger compiled bundles.

            ### Launch

            ```bash
            # Linux / macOS
            ./sl-viewer

            # Windows
            sl-viewer.exe
            ```

            ### Checksums

            | Asset | Platform |
            | ----- | -------- |
            | `sl-viewer-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` | Linux (x86_64) |
            | `sl-viewer-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz`   | macOS (Intel)   |
            | `sl-viewer-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz`  | macOS (Apple Silicon) |
            | `sl-viewer-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip`   | Windows (x86_64) |
            | `sl-viewer-${{ github.ref_name }}-windows-msi-scaffold.zip` | WiX v4 source + build notes (not an MSI) |

            Verify archive hashes with `SHA256SUMS`. CI also attempts to publish
            `SHA256SUMS.sigstore.json`, a best-effort cosign keyless signature bundle.
            `session-ledger.cdx.json` is the CycloneDX SBOM. GitHub build provenance
            is required for canonical KooshaPari/SessionLedger releases and can be
            verified with `gh attestation`.

            See [`crates/sl-viewer/README.md`](https://github.com/KooshaPari/SessionLedger/tree/main/crates/sl-viewer) for build instructions.
          draft: false
          prerelease: false
          files: artifacts/*

  sign-checksums:
    name: sign checksums · keyless (best effort)
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: download published checksums
        id: download
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ github.ref_name }}" --pattern SHA256SUMS

      - name: install cosign
        id: cosign
        if: steps.download.outcome == 'success'
        continue-on-error: true
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: sign checksums with GitHub OIDC
        id: sign
        if: steps.cosign.outcome == 'success'
        continue-on-error: true
        run: cosign sign-blob --yes --bundle SHA256SUMS.sigstore.json SHA256SUMS

      - name: publish Sigstore bundle
        id: publish
        if: steps.sign.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" SHA256SUMS.sigstore.json --clobber

      - name: report signing status
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.publish.outcome }}" = "success" ]; then
            echo "::notice::Published SHA256SUMS.sigstore.json (cosign keyless signature)."
            echo "### Cosign signing: published" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::notice::Cosign signing was skipped or failed; the unsigned release remains valid. download=${{ steps.download.outcome }}, install=${{ steps.cosign.outcome }}, sign=${{ steps.sign.outcome }}, publish=${{ steps.publish.outcome }}"
            echo "### Cosign signing: skipped or unavailable (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
          fi
