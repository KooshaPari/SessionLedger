name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: build · test · lint
    runs-on: ubuntu-latest # Linux only — Phenotype CI billing policy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: sl-daemon rustfmt
        run: cargo fmt --manifest-path crates/sl-daemon/Cargo.toml --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: sl-daemon clippy
        run: cargo clippy --manifest-path crates/sl-daemon/Cargo.toml --all-targets --all-features --locked -- -D warnings
      - name: build
        run: cargo build --all-targets --locked
      - name: sl-daemon build
        run: cargo build --manifest-path crates/sl-daemon/Cargo.toml --all-targets --locked
      - name: test
        run: cargo test --all-features --locked
      - name: sl-daemon test
        run: cargo test --manifest-path crates/sl-daemon/Cargo.toml --all-features --locked

  coverage:
    name: coverage (85% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: coverage
        run: cargo llvm-cov --all-features --fail-under-lines 85
