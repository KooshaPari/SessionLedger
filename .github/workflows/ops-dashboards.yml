name: Ops Dashboards

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ops-dashboards.yml"
      - "docs/ops/dashboards/**"
      - "scripts/dashboard-provision-check.ps1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ops-dashboards.yml"
      - "docs/ops/dashboards/**"
      - "scripts/dashboard-provision-check.ps1"

permissions:
  contents: read

jobs:
  dashboard-provision-check:
    name: dashboard provisioning evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: validate SessionLedger RED dashboard
        shell: pwsh
        run: ./scripts/dashboard-provision-check.ps1
