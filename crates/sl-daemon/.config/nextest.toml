# cargo-nextest defaults for the sl-daemon workspace.
# Mirrors repo-root .config/nextest.toml for `cargo nextest run` with
# --manifest-path crates/sl-daemon/Cargo.toml.

[store]
dir = "target/nextest"

[profile.default]
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }
retries = 0
fail-fast = false
status-level = "fail"
final-status-level = "flaky"

[profile.ci]
test-threads = "num-cpus"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 0
fail-fast = true
status-level = "fail"
final-status-level = "flaky"
