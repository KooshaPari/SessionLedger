<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="SessionLedger identity demo: lab-coat flask bubble motion">
  <title>SessionLedger — L105 Identity Demo (Lab-Coat flask bubble + cobalt/orange)</title>
  <defs>
    <linearGradient id="slBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f8fa"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="slLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <style>
      .sl-mono { font-family: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace; }
      .sl-bubble {
        animation: sl-rise 3.2s ease-in infinite;
        opacity: 0;
      }
      @keyframes sl-rise {
        0%   { transform: translateY(0)    scale(0.6); opacity: 0; }
        15%  { opacity: 0.9; }
        85%  { opacity: 0.7; }
        100% { transform: translateY(-90px) scale(1.1); opacity: 0; }
      }
      .sl-flame {
        transform-origin: 240px 110px;
        animation: sl-flame 1.8s ease-in-out infinite;
      }
      @keyframes sl-flame {
        0%, 100% { transform: scale(0.9) translateY(0);    opacity: 0.7; }
        50%      { transform: scale(1.15) translateY(-3px); opacity: 1; }
      }
      .sl-marker {
        animation: sl-pulse 2s ease-in-out infinite;
      }
      @keyframes sl-pulse {
        0%, 100% { opacity: 0.7; }
        50%      { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="480" height="270" fill="url(#slBg)"/>

  <g stroke="#1f2937" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="200" x2="480" y2="200"/>
    <line x1="0" y1="225" x2="480" y2="225"/>
  </g>

  <g transform="translate(80, 200)">
    <rect x="-12" y="-8" width="24" height="8" fill="#1f2937"/>
    <rect x="-3"  y="-30" width="6"  height="22" fill="#1f2937"/>
    <g class="sl-flame">
      <path d="M -3 -32 Q -10 -50 0 -64 Q 10 -50 3 -32 Z" fill="#f97316"/>
      <path d="M -2 -36 Q -5 -48 0 -58 Q 5 -48 2 -36 Z" fill="#facc15"/>
    </g>
  </g>

  <g transform="translate(240, 140)">
    <rect x="-7" y="-60" width="14" height="22" fill="none" stroke="#1f2937" stroke-width="2"/>
    <path d="M -7 -38 L -34 24 Q -34 32 -24 32 L 24 32 Q 34 32 34 24 L 7 -38 Z"
          fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <path d="M -32 12 L -22 32 L 22 32 L 32 12 Z" fill="url(#slLiquid)"/>
    <g>
      <circle cx="-12" cy="20" r="2.5" fill="#facc15" class="sl-bubble" style="animation-delay: -0.0s"/>
      <circle cx="6"   cy="22" r="3"   fill="#facc15" class="sl-bubble" style="animation-delay: -0.4s"/>
      <circle cx="-4"  cy="24" r="2"   fill="#facc15" class="sl-bubble" style="animation-delay: -0.8s"/>
      <circle cx="14"  cy="20" r="2.5" fill="#facc15" class="sl-bubble" style="animation-delay: -1.2s"/>
      <circle cx="-18" cy="24" r="2"   fill="#facc15" class="sl-bubble" style="animation-delay: -1.6s"/>
      <circle cx="2"   cy="26" r="3"   fill="#facc15" class="sl-bubble" style="animation-delay: -2.0s"/>
    </g>
    <g stroke="#1f2937" stroke-width="1" opacity="0.55">
      <line x1="22" y1="-20" x2="28" y2="-20"/>
      <line x1="22" y1="-8"  x2="26" y2="-8"/>
      <line x1="22" y1="4"   x2="28" y2="4"/>
      <line x1="22" y1="16"  x2="26" y2="16"/>
    </g>
  </g>

  <g transform="translate(380, 140)">
    <g class="sl-marker">
      <rect x="-20" y="-30" width="40" height="6" fill="#2563eb" rx="2"/>
      <rect x="-20" y="-18" width="30" height="6" fill="#2563eb" rx="2"/>
      <rect x="-20" y="-6"  width="36" height="6" fill="#2563eb" rx="2"/>
      <rect x="-20" y="6"   width="24" height="6" fill="#2563eb" rx="2"/>
      <rect x="-20" y="18"  width="32" height="6" fill="#2563eb" rx="2"/>
    </g>
  </g>

  <g class="sl-mono">
    <text x="240" y="58" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937" letter-spacing="0.18em">SESSIONLEDGER</text>
    <text x="240" y="74" text-anchor="middle" font-size="9" fill="#2563eb" letter-spacing="0.24em">bundle · compile · preserve</text>
  </g>

  <g class="sl-mono" font-size="10">
    <text x="40" y="258" fill="#1f2937" opacity="0.6">flask: live</text>
    <text x="440" y="258" text-anchor="end" fill="#1f2937" opacity="0.6">sl-daemon · ok</text>
  </g>

  <g stroke="#1f2937" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <path d="M22 22 L34 22 M22 22 L22 34"/>
    <path d="M458 22 L446 22 M458 22 L458 34"/>
    <path d="M22 248 L34 248 M22 248 L22 236"/>
    <path d="M458 248 L446 248 M458 248 L458 236"/>
  </g>
</svg>