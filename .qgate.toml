# qgate configuration for SessionLedger.
#
# Adopted via the "1 via 2" protocol (gate-first-red-then-backfill).
# `continue-on-error: true` in the workflow until per-module coverage
# reaches the threshold — flip to blocking once backfilled.

coverage_threshold = 85.0

# lcov generated by cargo-llvm-cov in the workflow.
coverage_path = "coverage/lcov.info"
coverage_format = "lcov"

# SessionLedger: Rust hexagonal with a browser contract suite enforced by the
# qgate workflow.
# Mutation testing is wired (nightly via cargo-mutants).
not_applicable = [
    "dast",          # no OpenAPI spec published
]
