name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  traceability:
    name: traceability SSOT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: lint traceability
        shell: pwsh
        run: ./docs/ops/traceability_lint.ps1

  eval-repro:
    name: eval reproducibility manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: verify eval manifest anchors
        shell: pwsh
        run: ./scripts/eval-repro-check.ps1

  openapi-drift:
    name: OpenAPI route drift · sl-daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/sl-daemon
      - name: check OpenAPI matches axum route surface
        shell: pwsh
        run: ./scripts/openapi-drift-check.ps1

  schema-migrate:
    name: durable schema migration scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: apply schema migrations in sqlite tests
        run: cargo test --features sqlite schema --locked

  reproducible-build:
    name: reproducible build · sl-daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/sl-daemon
      - name: compare two clean release builds
        shell: pwsh
        run: ./scripts/repro-check.ps1

  installer-lifecycle-smoke:
    name: installer lifecycle scaffold smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: validate installer scaffolds
        shell: pwsh
        run: ./scripts/installer-lifecycle-smoke.ps1

  installer-lifecycle-smoke-windows:
    name: installer lifecycle · Windows unsigned install smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: package, install, version check, uninstall
        shell: pwsh
        run: ./scripts/installer-lifecycle-smoke.ps1 -WindowsInstallLifecycle

  build-test:
    name: build · test · lint
    runs-on: ubuntu-latest # Linux only — Phenotype CI billing policy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: build
        run: cargo build --all-targets --locked
      - name: test
        run: cargo test --all-features --locked
      - name: property and flake smoke (3 repeats)
        env:
          PROPTEST_CASES: 64
        run: |
          for run in 1 2 3; do
            echo "property test repeat ${run}/3"
            cargo test --test properties --locked
          done

  fuzz-smoke:
    name: fuzz smoke (10 seconds)
    runs-on: ubuntu-latest
    # cargo-fuzz requires nightly. rust-toolchain.toml pins stable, so force
    # nightly via RUSTUP_TOOLCHAIN. Clear inherited RUSTFLAGS. Pin gnu host
    # target — cargo-fuzz otherwise may pick musl, which cannot use ASAN.
    env:
      RUSTFLAGS: ""
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # nightly for fuzz
        with:
          toolchain: nightly
          components: rust-src
          targets: x86_64-unknown-linux-gnu
      - name: install cargo-fuzz
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # cargo-fuzz
        with:
          tool: cargo-fuzz
      - name: fuzz OKF parse and roundtrip
        run: cargo +nightly fuzz run okf_roundtrip --sanitizer address --target x86_64-unknown-linux-gnu -- -max_total_time=10

  coverage:
    name: coverage (85% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # cargo-llvm-cov
      - name: coverage
        run: cargo llvm-cov --all-features --fail-under-lines 85
