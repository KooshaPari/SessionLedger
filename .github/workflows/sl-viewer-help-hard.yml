# Blocking sl-viewer CLI help PR gate for C01/C09 DX.
name: sl-viewer help hard

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  sl-viewer-help-selfcheck:
    name: sl-viewer help · SelfCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: sl-viewer help CI SelfCheck
        shell: pwsh
        run: ./scripts/sl-viewer-help-check.ps1 -SelfCheck

  sl-viewer-help-unit-tests:
    name: sl-viewer help · unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/sl-viewer
          key: sl-viewer-help-unit
      - name: cargo test cli_help (blocking)
        run: cargo test -p sl-viewer cli_help --locked
