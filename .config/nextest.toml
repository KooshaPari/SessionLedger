# cargo-nextest defaults for SessionLedger (root workspace + viewer).
# Daemon workspace: see crates/sl-daemon/.config/nextest.toml
# Install: cargo install cargo-nextest --locked

[store]
# Keep nextest metadata under the shared target tree when possible.
dir = "target/nextest"

[profile.default]
# Prefer all CPUs for the fast inner loop; override with --test-threads if noisy.
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }
# No automatic retries — flakes belong in docs/ops/flake-tracker.md.
retries = 0
fail-fast = false
status-level = "fail"
final-status-level = "flaky"

[profile.ci]
test-threads = "num-cpus"
slow-timeout = { period = "120s", terminate-after = 2 }
retries = 0
fail-fast = true
status-level = "fail"
final-status-level = "flaky"
