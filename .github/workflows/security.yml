# P0 security + supply-chain checks for SessionLedger.
# cargo-deny (deny.toml at repo root) + cargo-audit + gitleaks + trufflehog +
# .env.example secret hygiene. Keep green on PRs.
# Weekly schedule covers L33 "scheduled full scan beyond PR"; gitleaks SARIF
# uploads to code scanning when security-events write is available.

name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Monday 06:00 UTC — full scan outside PR pressure
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  env-example:
    name: env.example hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: assert .env.example keys and no high-entropy secrets
        shell: pwsh
        run: ./scripts/env-example-check.ps1

  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # deny.toml at repo root is the default; do not pass --config as a
      # global flag (cargo-deny-action places arguments before `check`).
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
          rust-version: "1.85.0"

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for SARIF upload to GitHub code scanning (L33).
      security-events: write
      # gitleaks-action may comment on PRs when licensed; harmless if unused.
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Explicit SARIF upload so findings land in the Security tab even when
      # the action skips its built-in upload (fork PRs: continue-on-error).
      - name: Upload gitleaks SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: gitleaks

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          version: "3.95.9"
          extra_args: --results=verified,unknown

  # Blocking C04 L40 sandbox boundary evidence — hermetic SelfCheck only.
  sandbox-boundary:
    name: sandbox boundary smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: self-check sandbox boundary checklist + Containerfile anchors
        shell: pwsh
        run: ./scripts/sandbox-boundary-check.ps1 -SelfCheck

  # Soft C04 L38 CVE feed subscription evidence — hermetic SelfCheck only.
  cve-feed:
    name: CVE feed subscription smoke (soft)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: self-check GHSA+OSV+NVD subscription docs + deny/audit/Dependabot anchors
        shell: pwsh
        run: ./scripts/cve-feed-check.ps1 -SelfCheck

  # Soft C02 L24 in-tree PII redaction helper — hermetic SelfCheck only.
  pii-redaction:
    name: PII redaction helper smoke (soft)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: self-check pii_redact helper + ops doc anchors
        shell: pwsh
        run: ./scripts/pii-redact-check.ps1 -SelfCheck

