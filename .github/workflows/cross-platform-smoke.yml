name: Cross-platform smoke

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/cross-platform-smoke.yml"
      - "docs/ops/cross-platform-ci.md"
      - "scripts/assert-release-matrix.ps1"
  push:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/cross-platform-smoke.yml"
      - "docs/ops/cross-platform-ci.md"
      - "scripts/assert-release-matrix.ps1"
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-matrix-contract:
    name: release matrix contains Linux, macOS, Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: assert release matrix platforms
        shell: pwsh
        run: ./scripts/assert-release-matrix.ps1
