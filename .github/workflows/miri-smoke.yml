# Soft / nightly Miri smoke for C00 L7 concurrency evidence.
# Runs the pure-std race_model subset only (no rusqlite/zstd FFI).
# continue-on-error: soft gate toward full loom/shuttle/miri permutation checkers.
name: miri smoke

on:
  schedule:
    - cron: "27 4 * * *" # nightly 04:27 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # rust-toolchain.toml pins stable; force nightly for cargo-miri.
  RUSTUP_TOOLCHAIN: nightly
  RUSTFLAGS: ""

jobs:
  miri-race-model:
    name: soft miri · race_model
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # nightly + miri
        with:
          toolchain: nightly
          components: miri, rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo miri setup
        run: cargo miri setup
      - name: miri race_model (soft)
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance"
        run: cargo miri test --test race_model --locked -- --test-threads=1
