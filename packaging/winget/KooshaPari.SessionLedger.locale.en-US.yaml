ShortDescription: OKF-native session compiler — capture, archive, and replay AI agent sessions.
Description: |-
  SessionLedger is an OKF-native session compiler. This winget package installs
  the sl-viewer desktop companion from GitHub Releases (checksum-verified ZIP).

  The sl-daemon HTTP service is installed separately via Cargo until a dedicated
  daemon release artifact is published:

    cargo install --git https://github.com/KooshaPari/SessionLedger --locked --path crates/sl-daemon

  Native MSI/PKG installers, when added, live under packaging/windows and
  packaging/macos — this portable ZIP channel does not replace those lanes.
