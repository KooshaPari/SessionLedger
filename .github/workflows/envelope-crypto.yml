# Blocking hard envelope-crypto CI evidence for C02 L22.
# Hermetic SelfCheck only — docs + workflow anchors; does not enforce in-tree
# KMS, sealed secrets, KEK wrap, or OKF/audit at-rest encryption (those stay unpaid).
name: envelope crypto

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  envelope-crypto-selfcheck:
    name: envelope-crypto · SelfCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: hard envelope-crypto CI evidence SelfCheck
        shell: pwsh
        run: ./scripts/envelope-crypto-check.ps1 -SelfCheck
