<?xml version="1.0" encoding="UTF-8"?>
<!--
  SessionLedger brand icon — Lab-Coat palette (proposed 2026-07-06 by vision-pillar).
  R&D-lab family: clean white panel + cobalt-blue + amber warning + teal secondary.
  Mark: stylized eye-piece lens containing a flask silhouette. The flask holds
  cobalt-blue liquid with a single amber-orange meniscus drop = the live session.

  Palette tokens:
    #f6f8fa lab-white (background)
    #1f2937 slate-900 (panel/text base)
    #2563eb cobalt-blue (primary accent)
    #f97316 orange-500 (live-session / lit Bunsen | was f59e0b amber-orange, swapped 2026-07-06 to avoid MelosViz mv-warn hex overlap)
    #14b8a6 teal-cool (secondary / growth-medium)

  Source-of-truth: this file. All raster exports derive from this 1024x1024 SVG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="SessionLedger">
  <title>SessionLedger</title>
  <desc>Lab-Coat mark: eye-piece lens with cobalt flask inside.</desc>

  <defs>
    <!-- Lab-white panel with subtle inner gradient (lit-from-above feel) -->
    <linearGradient id="sl-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>

    <!-- Cobalt flask-liquid gradient -->
    <linearGradient id="sl-cobalt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Amber hot-pixel glow -->
    <radialGradient id="sl-amber-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f97316" stop-opacity="1"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow for the eye-piece rim -->
    <filter id="sl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for the flask interior (so liquid stays inside the flask body) -->
    <clipPath id="sl-flask-clip">
      <path d="M 432 380
               L 432 540
               L 360 720
               Q 360 800 432 800
               L 592 800
               Q 664 800 664 720
               L 592 540
               L 592 380 Z"/>
    </clipPath>
  </defs>

  <!-- Outer lab-white background -->
  <rect width="1024" height="1024" rx="208" ry="208" fill="#f6f8fa"/>

  <!-- Panel: rounded-rect inset with subtle gradient -->
  <rect x="64" y="64" width="896" height="896" rx="160" ry="160"
        fill="url(#sl-panel)"
        stroke="#1f2937" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Eye-piece lens (the observation ring) -->
  <g filter="url(#sl-shadow)">
    <circle cx="512" cy="512" r="320"
            fill="#ffffff"
            stroke="#1f2937" stroke-width="14"/>
    <!-- Inner lens highlight -->
    <circle cx="512" cy="512" r="296"
            fill="none"
            stroke="#2563eb" stroke-width="3" stroke-opacity="0.5"/>
  </g>

  <!-- Flask silhouette inside the lens -->
  <!-- Flask neck (top, narrower) + body (bottom, wider) -->
  <g>
    <!-- Flask body: trapezoidal with rounded bottom -->
    <path d="M 432 380
             L 432 540
             L 360 720
             Q 360 800 432 800
             L 592 800
             Q 664 800 664 720
             L 592 540
             L 592 380 Z"
          fill="#ffffff"
          stroke="#1f2937" stroke-width="10" stroke-linejoin="round"/>

    <!-- Flask neck rim -->
    <rect x="416" y="320" width="192" height="64" rx="14"
          fill="#ffffff" stroke="#1f2937" stroke-width="10"/>

    <!-- Cobalt liquid (clipped to flask body) -->
    <g clip-path="url(#sl-flask-clip)">
      <rect x="340" y="560" width="340" height="260" fill="url(#sl-cobalt)"/>
    </g>

    <!-- Measurement ticks on the flask body (left side) -->
    <g stroke="#1f2937" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7">
      <line x1="372" y1="640" x2="408" y2="640"/>
      <line x1="372" y1="700" x2="396" y2="700"/>
      <line x1="372" y1="760" x2="408" y2="760"/>
    </g>

    <!-- Single amber-orange hot drop (the live-session meniscus) -->
    <circle cx="512" cy="558" r="56" fill="url(#sl-amber-glow)"/>
    <circle cx="512" cy="558" r="20" fill="#f97316"/>

    <!-- Teal bubble rising (secondary accent) -->
    <circle cx="476" cy="650" r="14" fill="#14b8a6" fill-opacity="0.8"/>
    <circle cx="552" cy="700" r="10" fill="#14b8a6" fill-opacity="0.8"/>
  </g>

  <!-- Subtle outer-ring tick marks (microscope reticle feel) -->
  <g stroke="#1f2937" stroke-width="4" stroke-linecap="round" stroke-opacity="0.5">
    <line x1="512" y1="200" x2="512" y2="232"/>
    <line x1="512" y1="792" x2="512" y2="824"/>
    <line x1="200" y1="512" x2="232" y2="512"/>
    <line x1="792" y1="512" x2="824" y2="512"/>
  </g>

  <!-- Tiny corner accents (lab notebook feel) -->
  <g fill="#2563eb" opacity="0.45">
    <rect x="112" y="112" width="36" height="8"  rx="3"/>
    <rect x="112" y="112" width="8"  height="36" rx="3"/>
    <rect x="876" y="112" width="36" height="8"  rx="3"/>
    <rect x="904" y="112" width="8"  height="36" rx="3"/>
    <rect x="112" y="904" width="36" height="8"  rx="3"/>
    <rect x="112" y="876" width="8"  height="36" rx="3"/>
    <rect x="876" y="904" width="36" height="8"  rx="3"/>
    <rect x="904" y="876" width="8"  height="36" rx="3"/>
  </g>
</svg>