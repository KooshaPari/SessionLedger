# Blocking hard platform signing-readiness CI evidence for C11 L112.
# Hermetic SelfCheck only — docs + release.yml unsigned anchors; does not access
# Authenticode / notarization credentials (those remain unpaid per ADR 0003).
name: signing hard

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  signing-hard-selfcheck:
    name: signing hard · SelfCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: platform signing readiness hard SelfCheck
        shell: pwsh
        run: ./scripts/signing-readiness-check.ps1 -SelfCheck
