version: "0.5"
processes:
  sl-daemon:
    command: cargo run -p sl-daemon -- serve
    environment:
      - SL_PORT=8080
      - SL_DATA_DIR=./.sl-data
    readiness_probe:
      http_get:
        path: /healthz
        port: 8080
      initial_delay_seconds: 3
  sl-viewer:
    command: cargo run -p sl-viewer
    depends_on:
      sl-daemon:
        condition: process_healthy
