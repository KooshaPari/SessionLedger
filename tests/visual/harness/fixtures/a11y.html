<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SessionLedger accessibility contract</title>
  <style>
    :root {
      --lc-lab-white: #f6f8fa;
      --lc-slate: #1f2937;
      --lc-cobalt: #2563eb;
      --lc-orange: #f97316;
      --lc-teal: #14b8a6;
      --muted: #4b5563;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--lc-slate); background: var(--lc-lab-white); font: 16px/1.5 system-ui, sans-serif; }
    header { padding: 1rem 1.25rem; border-bottom: 1px solid #cbd5e1; }
    header h1 { margin: 0; font-size: 1.25rem; }
    .shell { display: grid; grid-template-columns: minmax(15rem, 22rem) 1fr; min-height: calc(100vh - 4rem); }
    nav { padding: 1rem; border-right: 1px solid #cbd5e1; }
    [role="tablist"] { display: grid; gap: .5rem; }
    [role="tab"] { padding: .7rem 1rem; border: 1px solid #94a3b8; border-radius: .35rem; color: var(--lc-slate); background: #fff; text-align: left; font: inherit; cursor: pointer; }
    [role="tab"][aria-selected="true"] { border-left: .3rem solid var(--lc-cobalt); background: #dbeafe; font-weight: 700; }
    main { padding: 1.5rem; min-width: 0; }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: .35rem; font-weight: 600; }
    input { width: min(100%, 28rem); padding: .65rem; border: 1px solid #64748b; border-radius: .35rem; color: var(--lc-slate); background: #fff; font: inherit; }
    .actions { display: flex; gap: .75rem; margin-top: 1rem; }
    button { padding: .65rem 1rem; border: 1px solid #1d4ed8; border-radius: .35rem; color: #fff; background: #1d4ed8; font: inherit; }
    button.secondary { color: var(--lc-slate); background: #fff; border-color: #64748b; }
    :focus-visible { outline: 3px solid var(--lc-cobalt); outline-offset: 3px; }
    .status { margin-top: 1rem; color: var(--muted); }
    .live { display: inline-flex; align-items: center; gap: .4rem; color: var(--lc-slate); font-weight: 600; }
    .live::before { width: .7rem; height: .7rem; border-radius: 50%; background: var(--lc-orange); content: ""; }
    [hidden] { display: none; }
    @media (max-width: 600px) {
      .shell { grid-template-columns: 1fr; }
      nav { border-right: 0; border-bottom: 1px solid #cbd5e1; }
      [role="tablist"] { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header><h1>SessionLedger</h1></header>
  <div class="shell">
    <nav aria-label="Primary viewer navigation">
      <div role="tablist" aria-label="SessionLedger views">
        <button id="tab-bundles" role="tab" aria-selected="true" aria-controls="panel-bundles" tabindex="0">Bundles</button>
        <button id="tab-history" role="tab" aria-selected="false" aria-controls="panel-history" tabindex="-1">History</button>
        <button id="tab-search" role="tab" aria-selected="false" aria-controls="panel-search" tabindex="-1">Search</button>
        <button id="tab-replay" role="tab" aria-selected="false" aria-controls="panel-replay" tabindex="-1">Replay</button>
      </div>
    </nav>
    <main id="main-content">
      <section id="panel-bundles" role="tabpanel" aria-labelledby="tab-bundles">
        <h2>Compiled bundles</h2>
        <p class="status">Select a bundle from the list to view details.</p>
      </section>
      <section id="panel-history" role="tabpanel" aria-labelledby="tab-history" hidden>
        <h2>Session history</h2>
        <p class="live">Live session</p>
      </section>
      <section id="panel-search" role="tabpanel" aria-labelledby="tab-search" hidden>
        <h2>Search bundles</h2>
        <label for="query">Query</label>
        <input id="query" autocomplete="off">
        <div class="actions">
          <button type="button">Search</button>
          <button type="button" class="secondary" id="clear">Clear</button>
        </div>
        <p class="status" role="status" aria-live="polite">Escape clears the search.</p>
      </section>
      <section id="panel-replay" role="tabpanel" aria-labelledby="tab-replay" hidden>
        <h2>Replay</h2>
        <p class="status">Replay controls are ready.</p>
      </section>
    </main>
  </div>
  <script>
    const tabs = [...document.querySelectorAll('[role="tab"]')];
    const activate = (tab, focus = true) => {
      for (const candidate of tabs) {
        const selected = candidate === tab;
        candidate.setAttribute("aria-selected", String(selected));
        candidate.tabIndex = selected ? 0 : -1;
        document.getElementById(candidate.getAttribute("aria-controls")).hidden = !selected;
      }
      if (focus) tab.focus();
    };
    tabs.forEach((tab, index) => {
      tab.addEventListener("click", () => activate(tab, false));
      tab.addEventListener("keydown", event => {
        let next;
        if (event.key === "ArrowRight") next = (index + 1) % tabs.length;
        if (event.key === "ArrowLeft") next = (index + tabs.length - 1) % tabs.length;
        if (event.key === "Home") next = 0;
        if (event.key === "End") next = tabs.length - 1;
        if (next !== undefined) {
          event.preventDefault();
          activate(tabs[next]);
        }
      });
    });
    const clearSearch = () => {
      document.getElementById("query").value = "";
    };
    document.getElementById("clear").addEventListener("click", clearSearch);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !document.getElementById("panel-search").hidden) clearSearch();
    });
  </script>
</body>
</html>
