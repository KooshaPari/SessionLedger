name: Provenance contract

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/provenance-contract.yml"
      - "scripts/provenance-contract-check.ps1"
      - "docs/ops/reproducible-builds.md"
      - "docs/ops/fixtures/slsa-materials-contract.sample.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/provenance-contract.yml"
      - "scripts/provenance-contract-check.ps1"
      - "docs/ops/reproducible-builds.md"
      - "docs/ops/fixtures/slsa-materials-contract.sample.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provenance-contract:
    name: release provenance contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: assert blocking per-build provenance contract
        shell: pwsh
        run: ./scripts/provenance-contract-check.ps1
