# qgate quality gate for SessionLedger.
#
# Runs the reusable qgate workflow from KooshaPari/phenotype-tooling on a
# Linux standard runner. Non-blocking until per-module coverage reaches
# the .qgate.toml threshold (per the "1 via 2" protocol).
#
# Spectrum categories exercised (when PR #198 lands on phenotype-tooling):
#   - sast:  semgrep config=auto (Rust + Python ruleset)
#   - sbom:  cargo-cyclonedx generates target/sbom.cdx.json + per-crate
#            *.cdx.json; uploaded as the sbom-cyclonedx workflow artifact

name: qgate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  qgate:
    continue-on-error: true   # remove once per-module coverage ≥85%

    runs-on: ubuntu-latest   # Linux standard only — no billed runners

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@4305c38b25d97ef04a54b3a52498a5f41e40895c # stable
        with:
          toolchain: stable
          components: llvm-tools-preview, rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea00a3571f6e0 # v2.7.8
        with:
          workspaces: rust

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # Workspace-wide coverage → lcov so qgate's lcov parser can consume it.
      - name: Generate coverage (lcov)
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-targets --lcov --output-path coverage/lcov.info
          echo "lcov size: $(wc -l < coverage/lcov.info) lines"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json
          mkdir -p target
          cp session-ledger.cdx.json target/sbom.cdx.json
          echo "SBOM files:"
          find . -name '*.cdx.json' -print

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: |
            target/sbom.cdx.json
            **/*.cdx.json
          if-no-files-found: error
          retention-days: 30

      # qgate reusable workflow — runs the gate, emits JSON report.
      - name: qgate quality gate
        uses: KooshaPari/phenotype-tooling/.github/workflows/reusable/quality-gate.yml@main
        with:
          coverage-report: coverage/lcov.info
          coverage-format: lcov
          threshold: 85
          not-applicable: 'a11y,e2e,dast'
          sast-config: 'auto'
        secrets: inherit
