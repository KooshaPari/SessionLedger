name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  traceability:
    name: traceability SSOT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: lint traceability
        shell: pwsh
        run: ./docs/ops/traceability_lint.ps1

  eval-repro:
    name: eval reproducibility manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: verify eval manifest anchors
        shell: pwsh
        run: ./scripts/eval-repro-check.ps1

  # Fast policy smoke for the blocking bench-gate workflow (full Criterion run
  # stays in .github/workflows/bench-gate.yml). Do not mark continue-on-error.
  perf-budget-policy:
    name: pipeline perf-budget policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: assert enforced perf-budget thresholds
        shell: pwsh
        run: ./scripts/bench-gate.ps1 -SelfCheck

  # Blocking C00 L6 latency baseline schema smoke (also covered by SoftLatencyCheck in bench-gate.yml).
  latency-baseline-policy:
    name: latency baseline policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: assert checked-in p95 latency baselines
        shell: pwsh
        run: ./scripts/bench-gate.ps1 -SoftLatencyCheck

  openapi-drift:
    name: OpenAPI route drift · sl-daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/sl-daemon
      - name: check OpenAPI matches axum route surface
        shell: pwsh
        run: ./scripts/openapi-drift-check.ps1

  schema-migrate:
    name: durable schema migration scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: apply schema migrations and sqlite memory adapter tests
        run: cargo test --features sqlite --locked
      - name: sl-daemon sqlite memory wiring
        working-directory: crates/sl-daemon
        run: cargo test --features sqlite --locked

  flake-tracker:
    name: flake tracker records + rerun stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: validate flake tracker records
        shell: pwsh
        run: ./scripts/flake-tracker-check.ps1
      - name: property rerun stats (3 repeats)
        shell: pwsh
        env:
          PROPTEST_CASES: 64
          FLAKE_RERUN_REPEATS: 3
        run: ./scripts/flake-rerun-stats.ps1
      - name: upload flake rerun stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: flake-rerun-stats
          path: docs/ops/flake-rerun-stats.json
          if-no-files-found: error

  reproducible-build:
    name: reproducible build · sl-daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: crates/sl-daemon
      - name: compare two clean release builds
        shell: pwsh
        run: ./scripts/repro-check.ps1

  installer-lifecycle-smoke:
    name: clean-host smoke · scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: validate installer scaffolds and clean-host docs
        shell: pwsh
        run: ./scripts/installer-lifecycle-smoke.ps1 -EvidencePath packaging/dist/clean-host-evidence-scaffold.json
      - name: upload clean-host scaffold evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: clean-host-evidence-scaffold
          path: packaging/dist/clean-host-evidence-scaffold.json
          if-no-files-found: error

  clean-host-smoke-windows:
    name: clean-host smoke · Windows unsigned portable install
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: unsigned portable install, version check, uninstall
        shell: pwsh
        run: ./scripts/installer-lifecycle-smoke.ps1 -WindowsInstallLifecycle -EvidencePath packaging/dist/clean-host-evidence.json
      - name: upload clean-host evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: clean-host-evidence-windows
          path: packaging/dist/clean-host-evidence.json
          if-no-files-found: error

  build-test:
    name: build · test · lint
    runs-on: ubuntu-latest # Linux only — Phenotype CI billing policy
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: build
        run: cargo build --all-targets --locked
      - name: test
        run: cargo test --all-features --locked
      - name: property and flake smoke (3 repeats)
        shell: pwsh
        env:
          PROPTEST_CASES: 64
        run: |
          $skipArgs = @(& ./scripts/flake-quarantine-apply.ps1)
          for ($run = 1; $run -le 3; $run++) {
            Write-Host "property test repeat ${run}/3"
            cargo test --test properties --locked @skipArgs
          }

  fuzz-smoke:
    name: fuzz smoke (10 seconds)
    runs-on: ubuntu-latest
    # cargo-fuzz requires nightly. rust-toolchain.toml pins stable, so force
    # nightly via RUSTUP_TOOLCHAIN. Clear inherited RUSTFLAGS. Pin gnu host
    # target — cargo-fuzz otherwise may pick musl, which cannot use ASAN.
    env:
      RUSTFLAGS: ""
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # nightly for fuzz
        with:
          toolchain: nightly
          components: rust-src
          targets: x86_64-unknown-linux-gnu
      - name: install cargo-fuzz
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # cargo-fuzz
        with:
          tool: cargo-fuzz
      - name: fuzz OKF parse and roundtrip
        run: cargo +nightly fuzz run okf_roundtrip --sanitizer address --target x86_64-unknown-linux-gnu -- -max_total_time=10
      - name: fuzz JSONL ingest parse
        run: cargo +nightly fuzz run jsonl_ingest --sanitizer address --target x86_64-unknown-linux-gnu -- -max_total_time=10

  coverage:
    name: coverage (85% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # cargo-llvm-cov
      - name: coverage
        run: cargo llvm-cov --all-features --fail-under-lines 85
