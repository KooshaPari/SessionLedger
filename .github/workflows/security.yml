# P0 security + supply-chain checks for SessionLedger.
# cargo-deny (deny.toml at repo root) + gitleaks. Keep green on PRs.

name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # deny.toml at repo root is the default; do not pass --config as a
      # global flag (cargo-deny-action places arguments before `check`).
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          rust-version: "1.85.0"

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
