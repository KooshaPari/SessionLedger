# qgate quality gate for SessionLedger.
#
# Calls the reusable quality-gate workflow from KooshaPari/phenotype-tooling on a
# Linux standard runner and runs the browser contract suite as a required
# sibling job. Coverage remains advisory until the per-module floor is reached,
# but browser accessibility/responsive/visual regressions are blocking.
#
# Pin policy: both the workflow ref and qgate-ref must be full commit SHAs
# (never @main / floating tags). See docs/ops/qgate-pin.md.
#
# Spectrum categories exercised:
#   - sast:  semgrep config=auto (Rust + Python ruleset)
#   - sbom:  cargo-cyclonedx generates target/sbom.cdx.json + per-crate
#            *.cdx.json; uploaded as the sbom-cyclonedx workflow artifact

name: qgate

on:
  pull_request:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Local coverage + SBOM evidence (artifacts for review). The reusable gate
  # job below is the immutable phenotype-tooling entrypoint.
  prepare:
    runs-on: ubuntu-latest   # Linux standard only — no billed runners

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev \
            libgdk-pixbuf-2.0-dev libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev libxdo-dev libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview, rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      # Core Rust coverage → lcov so qgate's lcov parser can consume it.
      # The Dioxus viewer is validated by the blocking browser/axe contract
      # job; keeping it out of llvm-cov avoids treating uninstrumented WASM UI
      # glue as an untested core-library regression.
      - name: Generate coverage (lcov)
        run: |
          mkdir -p coverage
          cargo llvm-cov --package session-ledger --features sqlite --all-targets --lcov --output-path coverage/lcov.info
          echo "lcov size: $(wc -l < coverage/lcov.info) lines"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx --format json
          mkdir -p target
          cp session-ledger.cdx.json target/sbom.cdx.json
          echo "SBOM files:"
          find . -name '*.cdx.json' -print

      - name: Validate CycloneDX SBOM anchors
        shell: pwsh
        run: ./scripts/sbom-validate-check.ps1 -Path target/sbom.cdx.json

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: |
            target/sbom.cdx.json
            **/*.cdx.json
          if-no-files-found: error
          retention-days: 30

  # Browser quality is part of qgate, not an unrelated advisory workflow.
  browser-e2e:
    name: browser e2e · axe · responsive · visual
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/visual/harness
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/visual/harness/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # v2
        with:
          tool: dioxus-cli@0.7.9
      - name: Build sl-viewer web surface
        working-directory: crates/sl-viewer
        # Binaryen bundled by dx 0.7.9 aborts when rewriting LLVM DWARF
        # compile-unit metadata emitted by the pinned Rust toolchain. Release
        # browser artifacts do not need DWARF (source maps are not shipped),
        # so omit debug symbols and keep wasm-opt's production optimization
        # pass enabled instead of accepting a non-deterministic SIGABRT.
        run: dx build --platform web --release --debug-symbols false --no-default-features --features web
      - name: Install harness dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser contract suite
        run: timeout 15m npm run test:a11y && timeout 15m npm run test:responsive && timeout 15m npm run test:visual

  # Run qgate directly instead of calling the external reusable workflow. The
  # latter currently produces zero-job runs in GitHub Actions (including its
  # other public callers), leaving no check to enforce on pull requests.
  # Keep the tooling revision immutable while retaining a normal runner job.
  quality-gate:
    name: quality gate · qgate
    needs: [prepare, browser-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-lcov
          path: coverage
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-cyclonedx
          path: .
      - name: Checkout pinned qgate source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: KooshaPari/phenotype-tooling
          ref: c43cc4af2cbcc2bb2df37f3e4ab78cc5d8c1b3ad
          path: _phenotype-tooling
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Install qgate build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev \
            libgdk-pixbuf-2.0-dev libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev libxdo-dev libsoup-3.0-dev
      - name: Install cargo-audit
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # v2
        with:
          tool: cargo-audit
      - name: Run bounded Rust static checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
      - name: Build qgate
        run: cargo build --release --manifest-path _phenotype-tooling/crates/qgate/Cargo.toml
      - name: Run qgate
        run: |
          ./_phenotype-tooling/target/release/qgate \
            run \
            --coverage-report coverage/lcov.info \
            --coverage-format lcov \
            --threshold 85
